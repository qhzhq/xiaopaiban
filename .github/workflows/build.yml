name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.5.15)'
        required: true
        default: '1.5.16'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.5.16' }}

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: macos-14
            rust-target: x86_64-apple-darwin
          - arch: aarch64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Verify Pake
        run: pake --version

      - name: Build macOS DMG (${{ matrix.arch }})
        run: |
          pake index.html \
            --name 小排版 \
            --targets dmg \
            --icon icon.png \
            --width 1024 \
            --height 768 \
            --use-local-file \
            --app-version ${{ env.APP_VERSION }}

      - name: Upload macOS DMG (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Disable MSI bundling (Wix broken on CI)
        shell: pwsh
        run: |
          $TAURI_CONF = "$(npm root -g)\pake-cli\src-tauri\.pake\tauri.conf.json"
          $json = Get-Content $TAURI_CONF -Raw | ConvertFrom-Json
          $json.tauri.bundle.targets = @("nsis")
          $json | ConvertTo-Json -Depth 10 | Set-Content $TAURI_CONF
          Write-Host "Tauri bundle targets set to nsis only"

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pake index.html `
            --name 小排版 `
            --icon icon.png `
            --width 1024 `
            --height 768 `
            --use-local-file `
            --app-version ${{ env.APP_VERSION }}

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-exe
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Build Linux DEB
        run: |
          pake index.html \
            --name 小排版 \
            --targets deb \
            --icon icon.png \
            --width 1024 \
            --height 768 \
            --use-local-file \
            --app-version ${{ env.APP_VERSION }}

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-deb
          path: |
            src-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-x86_64-dmg/*.dmg
            artifacts/macos-aarch64-dmg/*.dmg
            artifacts/windows-x86_64-exe/*.exe
            artifacts/linux-x86_64-deb/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
