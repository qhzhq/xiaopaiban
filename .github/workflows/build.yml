name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.5.1)'
        required: true
        default: '1.5.1'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.5.1' }}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Prepare build files
        run: |
          mkdir -p pake-build
          cp index.html main.js favicon.ico icon.png icon.icns pake-build/ 2>/dev/null
          cp pake.json pake-build/
          cp -r Images pake-build/
          cp -r js pake-build/
          
      - name: Build macOS Universal (Intel + Apple Silicon)
        working-directory: pake-build
        run: pake --config pake.json --targets dmg --multi-arch
          
      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-dmg
          path: |
            pake-build/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.arch }}-pc-windows-msvc
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Prepare build files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pake-build
          Copy-Item index.html, main.js, favicon.ico, icon.png, pake.json -Destination pake-build
          Copy-Item -Recurse Images -Destination pake-build\Images
          Copy-Item -Recurse js -Destination pake-build\js
          
      - name: Build Windows EXE (${{ matrix.arch }})
        working-directory: pake-build
        run: pake --config pake.json --targets nsis
          
      - name: Build Windows MSIX (${{ matrix.arch }})
        working-directory: pake-build
        run: pake --config pake.json --targets msix
          
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-exe
          path: |
            pake-build/target/release/bundle/nsis/*.exe
            
      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-msix
          path: |
            pake-build/target/release/bundle/msix/*.msix
            pake-build/target/release/bundle/msix/*.msixupload

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-unknown-linux-gnu
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Prepare build files
        run: |
          mkdir -p pake-build
          cp index.html main.js favicon.ico icon.png pake.json pake-build/
          cp -r Images pake-build/
          cp -r js pake-build/
          
      - name: Build Linux DEB (${{ matrix.arch }})
        working-directory: pake-build
        run: pake --config pake.json --targets deb
          
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-deb
          path: |
            pake-build/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msix
            artifacts/**/*.msixupload
            artifacts/**/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
