name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.5.13)'
        required: true
        default: '1.5.14'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.5.14' }}

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Apply Chinese menu patch (macOS only)
        run: |
          set +e
          GLOBAL_NM=$(npm root -g)
          MENU_FILE="$GLOBAL_NM/pake-cli/src-tauri/src/app/menu.rs"
          PATCH_FILE=".github/patches/menu.rs"
          if [ -f "$PATCH_FILE" ] && [ -f "$MENU_FILE" ]; then
            cp "$PATCH_FILE" "$MENU_FILE"
            echo "Menu patch applied"
          else
            echo "WARNING: Cannot apply menu patch, continuing..."
          fi
          exit 0

      - name: Prepare build files
        run: |
          mkdir -p pake-build
          cp index.html main.js favicon.ico icon.png icon.icns pake-build/ 2>/dev/null || true
          cp pake.json pake-build/
          cp -r Images pake-build/
          cp -r js pake-build/

      - name: Build macOS DMG (universal)
        working-directory: pake-build
        run: pake --config pake.json --targets dmg --multi-arch --app-version ${{ env.APP_VERSION }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            pake-build/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Prepare build files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pake-build
          Copy-Item index.html, main.js, favicon.ico, icon.png, icon.ico, pake.json -Destination pake-build -ErrorAction SilentlyContinue
          Copy-Item -Recurse Images -Destination pake-build\Images -ErrorAction SilentlyContinue
          Copy-Item -Recurse js -Destination pake-build\js -ErrorAction SilentlyContinue

      - name: Build Windows EXE
        working-directory: pake-build
        run: pake --config pake.json --targets nsis --app-version ${{ env.APP_VERSION }}

      - name: Build Windows MSIX
        working-directory: pake-build
        run: pake --config pake.json --targets msix --app-version ${{ env.APP_VERSION }}

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            pake-build/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            pake-build/target/release/bundle/msix/*.msix
            pake-build/target/release/bundle/msix/*.msixupload

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Pake CLI
        run: npm install -g pake-cli

      - name: Prepare build files
        run: |
          mkdir -p pake-build
          cp index.html main.js favicon.ico icon.png icon.icns pake.json pake-build/
          cp -r Images pake-build/
          cp -r js pake-build/

      - name: Build Linux DEB
        working-directory: pake-build
        run: pake --config pake.json --targets deb --app-version ${{ env.APP_VERSION }}

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            pake-build/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-exe/*.exe
            artifacts/windows-msix/*.msix
            artifacts/windows-msix/*.msixupload
            artifacts/linux-deb/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
