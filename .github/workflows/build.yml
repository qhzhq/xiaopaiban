name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.5.6)'
        required: true
        default: '1.5.6'

env:
  APP_VERSION: ${{ github.event.inputs.version || '1.5.6' }}

jobs:
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: macos-13
            rust-target: x86_64-apple-darwin
          - arch: aarch64
            runner: macos-latest
            rust-target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Apply custom menu patch
        run: |
          echo "=== Pake installation ==="
          which pake
          pake --version
          echo "=== Patch target path ==="
          PAKE_DIR="$(dirname $(dirname $(node -e "console.log(require.resolve('pake-cli'))")))"
          MENU_FILE="$PAKE_DIR/src-tauri/src/app/menu.rs"
          echo "Target: $MENU_FILE"
          echo "Exists before patch: $(test -f "$MENU_FILE" && echo YES || echo NO)"
          echo "=== Applying sed patches ==="
          # macOS 使用 BSD sed，需要空备份后缀
          # 1. 汉化子菜单名称
          sed -i '' 's/Submenu::new(app, "Edit")/Submenu::new(app, "编辑")/' "$MENU_FILE"
          sed -i '' 's/let app_menu = Submenu::new(app, "Pake")/let app_menu = Submenu::new(app, "小排版")/' "$MENU_FILE"
          sed -i '' 's/Submenu::new(app, "Help")/Submenu::new(app, "帮助")/' "$MENU_FILE"
          # 2. 汉化 About 标签
          sed -i '' 's/PredefinedMenuItem::about(app, Some("Pake")/PredefinedMenuItem::about(app, Some("关于 一键排版")/' "$MENU_FILE"
          # 3. 汉化编辑菜单项标签
          sed -i '' 's/PredefinedMenuItem::undo(app, None)/PredefinedMenuItem::undo(app, Some("撤销"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::redo(app, None)/PredefinedMenuItem::redo(app, Some("重做"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::cut(app, None)/PredefinedMenuItem::cut(app, Some("剪切"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::copy(app, None)/PredefinedMenuItem::copy(app, Some("复制"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::paste(app, None)/PredefinedMenuItem::paste(app, Some("粘贴"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::select_all(app, None)/PredefinedMenuItem::select_all(app, Some("全选"))/' "$MENU_FILE"
          # 4. 移除自定义菜单项的多余标签
          sed -i '' 's/"Paste and Match Style"/"粘贴并匹配样式"/' "$MENU_FILE"
          sed -i '' 's/"Copy URL"/"复制链接"/' "$MENU_FILE"
          sed -i '' 's/"Find"/"查找"/' "$MENU_FILE"
          sed -i '' 's/"Find Next"/"查找下一个"/' "$MENU_FILE"
          sed -i '' 's/"Find Previous"/"查找上一个"/' "$MENU_FILE"
          # 5. 汉化应用菜单项
          sed -i '' 's/PredefinedMenuItem::hide(app, None)/PredefinedMenuItem::hide(app, Some("隐藏"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::hide_others(app, None)/PredefinedMenuItem::hide_others(app, Some("隐藏其他"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::show_all(app, None)/PredefinedMenuItem::show_all(app, Some("显示全部"))/' "$MENU_FILE"
          sed -i '' 's/PredefinedMenuItem::quit(app, None)/PredefinedMenuItem::quit(app, Some("退出"))/' "$MENU_FILE"
          # 6. 汉化其他菜单
          sed -i '' 's/Submenu::new(app, "File")/Submenu::new(app, "文件")/' "$MENU_FILE"
          sed -i '' 's/Submenu::new(app, "View")/Submenu::new(app, "视图")/' "$MENU_FILE"
          sed -i '' 's/Submenu::new(app, "Window")/Submenu::new(app, "窗口")/' "$MENU_FILE"
          sed -i '' 's/"New Window"/"新建窗口"/' "$MENU_FILE"
          sed -i '' 's/"Reload"/"重新加载"/' "$MENU_FILE"
          sed -i '' 's/"Zoom In"/"放大"/' "$MENU_FILE"
          sed -i '' 's/"Zoom Out"/"缩小"/' "$MENU_FILE"
          sed -i '' 's/"Actual Size"/"原始大小"/' "$MENU_FILE"
          sed -i '' 's/"Toggle Fullscreen"/"切换全屏"/' "$MENU_FILE"
          sed -i '' 's/"Minimize"/"最小化"/' "$MENU_FILE"
          sed -i '' 's/"Zoom"/"缩放"/' "$MENU_FILE"
          sed -i '' 's/"Toggle Always on Top"/"窗口置顶"/' "$MENU_FILE"
          sed -i '' 's/"Clear Cache & Restart"/"清除缓存并重启"/' "$MENU_FILE"
          sed -i '' 's/"Close Window"/"关闭窗口"/' "$MENU_FILE"
          sed -i '' 's/"Back"/"后退"/' "$MENU_FILE"
          sed -i '' 's/"Forward"/"前进"/' "$MENU_FILE"
          sed -i '' 's/"Go Home"/"首页"/' "$MENU_FILE"
          echo "=== Patch result ==="
          head -40 "$MENU_FILE"
          echo "..."
          grep -n "编辑\|撤销\|剪切\|复制\|粘贴\|全选\|关于\|退出" "$MENU_FILE"
        
      - name: Build macOS DMG (${{ matrix.arch }})
        run: |
          pake index.html \
            --name 小排版 \
            --targets dmg \
            --icon icon.png \
            --width 1024 \
            --height 768 \
            --hide-title-bar \
            -v
          
      - name: Upload macOS DMG (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Build Windows EXE
        shell: pwsh
        run: |
          pake index.html `
            --name 小排版 `
            --targets nsis `
            --icon icon.png `
            --width 1024 `
            --height 768 `
            -v
          
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-exe
          path: |
            src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
          
      - name: Install Pake CLI
        run: npm install -g pake-cli
        
      - name: Build Linux DEB
        run: |
          pake index.html \
            --name 小排版 \
            --targets deb \
            --icon icon.png \
            --width 1024 \
            --height 768 \
            -v
          
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-deb
          path: |
            src-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: List downloaded artifacts
        run: find artifacts -type f | head -50
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-x86_64-dmg/*.dmg
            artifacts/macos-aarch64-dmg/*.dmg
            artifacts/windows-x86_64-exe/*.exe
            artifacts/linux-x86_64-deb/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
