name: Flutter Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Flutter app version (e.g., 2.0.1)'
        required: true
        default: '2.0.1'

env:
  FLUTTER_VERSION: '3.22.0'
  APP_VERSION: ${{ github.event.inputs.version || '2.0.1' }}

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: x86_64
            flutter_target: x64
          - os: macos-latest
            arch: aarch64
            flutter_target: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: xiaopaiban_flutter

      - name: Add macOS platform support
        run: flutter create --platforms=macos .
        working-directory: xiaopaiban_flutter

      - name: Build macOS
        run: flutter build macos --release --target-platform darwin-${{ matrix.flutter_target }}
        working-directory: xiaopaiban_flutter

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          cd xiaopaiban_flutter/build/macos/Build/Products/Release
          
          # 查找.app文件
          APP_NAME=$(ls -d *.app | head -1)
          if [ -z "$APP_NAME" ]; then
            echo "Error: No .app found"
            exit 1
          fi
          
          # 创建DMG
          create-dmg \
            --volname "小排版" \
            --volicon "$APP_NAME/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "$APP_NAME" 175 120 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 425 120 \
            "小排版_${APP_VERSION}_macOS_${{ matrix.arch }}.dmg" \
            "$APP_NAME"
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-macos-${{ matrix.arch }}
          path: xiaopaiban_flutter/build/macos/Build/Products/Release/*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: xiaopaiban_flutter

      - name: Add Windows platform support
        run: flutter create --platforms=windows .
        working-directory: xiaopaiban_flutter

      - name: Build Windows
        run: flutter build windows --release --target-platform windows-${{ matrix.arch }}
        working-directory: xiaopaiban_flutter

      - name: Install NSIS
        run: |
          choco install nsis -y
          # 添加NSIS到PATH
          echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH

      - name: Rename executable for installer
        run: |
          # 重命名可执行文件以匹配NSIS脚本中的名称
          cd xiaopaiban_flutter/build/windows/${{ matrix.arch }}/runner/Release
          if [ -f "xiaopaiban_flutter.exe" ]; then
            mv xiaopaiban_flutter.exe 小排版.exe
          fi
        shell: bash

      - name: Create installer (NSIS)
        run: |
          # 复制NSIS脚本到构建目录
          cp xiaopaiban_flutter/windows/installer.nsi xiaopaiban_flutter/build/windows/${{ matrix.arch }}/runner/Release/
          
          # 修改NSIS脚本中的架构路径
          cd xiaopaiban_flutter/build/windows/${{ matrix.arch }}/runner/Release
          (Get-Content installer.nsi) -replace 'build\\windows\\x64\\runner\\Release', "build\\windows\\${{ matrix.arch }}\\runner\\Release" | Set-Content installer.nsi
          
          # 创建安装包
          makensis installer.nsi
          
          # 同时创建zip包
          7z a "小排版_${APP_VERSION}_Windows_${{ matrix.arch }}.zip" *
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Create MSIX upload package
        run: |
          # 创建MSIX上传包
          cd xiaopaiban_flutter
          # 转换版本格式为MSIX格式 (x.y.z.w)
          MSIX_VERSION=$(echo $APP_VERSION | sed 's/\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1.\2.\3.0/')
          dart run msix:create --version $MSIX_VERSION --target-platform windows-${{ matrix.arch }}
        env:
          APP_VERSION: ${{ env.APP_VERSION }}



      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-${{ matrix.arch }}
          path: |
            xiaopaiban_flutter/build/windows/${{ matrix.arch }}/runner/Release/*.zip
            xiaopaiban_flutter/build/windows/${{ matrix.arch }}/runner/Release/*.msixupload
          retention-days: 30

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: xiaopaiban_flutter

      - name: Install cross-compilation tools (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Add Linux platform support
        run: flutter create --platforms=linux .
        working-directory: xiaopaiban_flutter

      - name: Build Linux
        run: |
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            flutter build linux --release --target-platform linux-arm64
          else
            flutter build linux --release
          fi
        working-directory: xiaopaiban_flutter

      - name: Create DEB package
        run: |
          cd xiaopaiban_flutter
          
          # 确定构建目录
          if [ "${{ matrix.arch }}" == "arm64" ]; then
            BUILD_DIR="build/linux/arm64/release/bundle"
          else
            BUILD_DIR="build/linux/x64/release/bundle"
          fi
          
          # 创建DEB包目录结构
          DEB_DIR="deb_package"
          mkdir -p $DEB_DIR/DEBIAN
          mkdir -p $DEB_DIR/usr/bin
          mkdir -p $DEB_DIR/usr/share/applications
          mkdir -p $DEB_DIR/usr/share/icons/hicolor/256x256/apps
          
          # 创建DEBIAN/control文件
          cat > $DEB_DIR/DEBIAN/control << EOF
          Package: xiaopaiban
          Version: $APP_VERSION
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch == 'arm64' && 'arm64' || 'amd64' }}
          Depends: libgtk-3-0, libglib2.0-0
          Maintainer: 小排版开发团队 <dev@xiaopaiban.com>
          Description: 小排版 - 一款简洁好用的文本排版工具
           小排版是一款基于Flutter Desktop的文本排版工具，支持全角半角转换、
           标点符号修正、段首缩进等功能。
          EOF
          
          # 复制文件
          cp -r $BUILD_DIR/* $DEB_DIR/usr/bin/
          # 查找可执行文件（通常与项目名称相同）
          EXECUTABLE=$(find $BUILD_DIR -maxdepth 1 -type f -executable | head -1)
          if [ -n "$EXECUTABLE" ]; then
            cp "$EXECUTABLE" $DEB_DIR/usr/bin/xiaopaiban
          else
            echo "Error: No executable found in $BUILD_DIR"
            exit 1
          fi
          chmod +x $DEB_DIR/usr/bin/xiaopaiban
          
          # 创建桌面文件
          cat > $DEB_DIR/usr/share/applications/xiaopaiban.desktop << EOF
          [Desktop Entry]
          Name=小排版
          Comment=文本排版工具
          Exec=/usr/bin/xiaopaiban
          Icon=/usr/share/icons/hicolor/256x256/apps/xiaopaiban.png
          Terminal=false
          Type=Application
          Categories=Utility;TextEditor;
          EOF
          
          # 复制图标
          cp assets/icon/app_icon.png $DEB_DIR/usr/share/icons/hicolor/256x256/apps/xiaopaiban.png
          
          # 创建DEB包
          dpkg-deb --build $DEB_DIR "小排版_${APP_VERSION}_Linux_${{ matrix.arch }}.deb"
          
          # 同时创建tar.gz包
          cd $BUILD_DIR
          tar -czf "../../小排版_${APP_VERSION}_Linux_${{ matrix.arch }}.tar.gz" *
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-linux-${{ matrix.arch }}
          path: 小排版_${{ env.APP_VERSION }}_Linux_${{ matrix.arch }}.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Flutter Desktop Release ${{ github.ref_name }}
          body: |
            ## Flutter Desktop Release
            
            **Version**: ${{ env.APP_VERSION }}
            
            ### 下载说明
            
            #### macOS
            - **x86_64**: `小排版_${APP_VERSION}_macOS_x86_64.dmg`
            - **arm64**: `小排版_${APP_VERSION}_macOS_aarch64.dmg`
            
            #### Windows
            - **x64**: `小排版_${APP_VERSION}_Windows_x64.zip` 和 `.msixupload`
            - **arm64**: `小排版_${APP_VERSION}_Windows_arm64.zip` 和 `.msixupload`
            
            #### Linux
            - **x64**: `小排版_${APP_VERSION}_Linux_x64.deb` 或 `.tar.gz`
            - **arm64**: `小排版_${APP_VERSION}_Linux_arm64.deb` 或 `.tar.gz`
            
            ### 安装说明
            
            #### macOS
            1. 下载对应架构的 `.dmg` 文件
            2. 双击打开 DMG，将应用拖入 Applications 文件夹
            
            #### Windows
            1. 下载对应架构的 `.exe` 安装包
            2. 运行安装程序，按照提示完成安装
            3. 或者下载 `.zip` 文件解压后运行 `小排版.exe`
            4. 也可以使用 `.msixupload` 包通过 Microsoft Store 安装
            
            #### Linux
            1. 下载对应架构的 `.deb` 文件
            2. 使用 `sudo dpkg -i 小排版_${APP_VERSION}_Linux_${{ matrix.arch }}.deb` 安装
            3. 或者下载 `.tar.gz` 文件解压后运行可执行文件
            
            ### 技术栈
            - Flutter Desktop
            - 支持 macOS (x86_64, arm64), Windows (x64, arm64), Linux (x64, arm64)
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.msixupload
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}