<!DOCTYPE html>
<html lang="zh-CN" class="auto-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键排版工具</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="keywords" content="文字排版,在线排版,文字排版工具,文字自动排版工具,一键排版">
    <meta name="description" content="文字排版、在线排版、文字排版工具、文字自动排版工具、一键排版，是在线投稿、在线文字自动排版首选。">
    <link rel="stylesheet" href="Images/layout.css">
    <link rel="stylesheet" href="js/layui/css/layui.css">
    <script src="js/layui/layui.js"></script>
</head>
<body>
    <!-- 标题栏区域 - macOS 风格 -->
    <div class="titlebar">
        <div class="titlebar-drag-region">
        </div>
        <!-- 主题切换 + 设置按钮 -->
        <div class="titlebar-actions">
            <div class="theme-segmented-control" id="themeGroup">
                <button class="theme-seg-btn" data-theme="light" title="亮色主题">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="8" cy="8" r="3"/>
                        <path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7"/>
                    </svg>
                    浅色
                </button>
                <button class="theme-seg-btn" data-theme="dark" title="暗色主题">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M6.5 2a6 6 0 106 8 4.5 4.5 0 01-6-8z"/>
                    </svg>
                    深色
                </button>
                <button class="theme-seg-btn selected" data-theme="auto" title="自动跟随系统">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="8" cy="8" r="3"/>
                        <path d="M8 1v1M8 14v1M1 8h1M14 8h1"/>
                    </svg>
                    自动
                </button>
            </div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="app-container">
        <!-- 紧凑工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <!-- 当前排版配置摘要 -->
                <span class="config-summary" id="configSummary" title="点击打开排版设置">空一行 · 全角×2 · 不转换</span>
                <!-- 设置齿轮按钮 -->
                <button class="btn-settings" id="settingsToggle" title="排版设置">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3">
                        <circle cx="8" cy="8" r="2.5"/>
                        <path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7"/>
                    </svg>
                    排版设置
                </button>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="xx_blx" checked>
                        <span class="checkbox-view"></span>
                        <span class="checkbox-text">波浪线修正</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="xx_bd">
                        <span class="checkbox-view"></span>
                        <span class="checkbox-text">标点修正</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="selectall" checked>
                        <span class="checkbox-view"></span>
                        <span class="checkbox-text">排版后全选</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="autocopy">
                        <span class="checkbox-view"></span>
                        <span class="checkbox-text">排版后直接复制</span>
                    </label>
                </div>
            </div>
            <div class="toolbar-right">
                <button class="btn-secondary" id="clearBtn">清空</button>
                <button class="btn-primary" id="formatBtn">⌘G 排版</button>
            </div>
        </div>

        <!-- 设置面板（折叠） -->
        <div class="settings-panel" id="settingsPanel" style="display:none;">
            <div class="settings-inner">
                <!-- 段落空行设置 -->
                <div class="control-group">
                    <label class="control-label">段落空行</label>
                    <div class="segmented-control" id="linespaceGroup">
                        <button class="seg-btn" data-value="1">无空行</button>
                        <button class="seg-btn selected" data-value="2">空一行</button>
                        <button class="seg-btn" data-value="3">空两行</button>
                        <button class="seg-btn" data-value="0">不调整</button>
                    </div>
                </div>

                <!-- 缩进设置 -->
                <div class="control-group">
                    <label class="control-label">段落缩进</label>
                    <div class="segmented-control" id="indentGroup">
                        <button class="seg-btn" data-value="1">不调整</button>
                        <button class="seg-btn selected" data-value="2">全角×2</button>
                        <button class="seg-btn" data-value="3">半角×4</button>
                        <button class="seg-btn" data-value="4">删首尾空格</button>
                        <button class="seg-btn" data-value="0">自定义</button>
                    </div>
                    <div class="custom-indent" id="customIndentWrap" style="display:none;">
                        <input type="text" id="fstString" class="custom-indent-input" placeholder="输入缩进字符">
                    </div>
                </div>

                <!-- 全角半角设置 -->
                <div class="control-group">
                    <label class="control-label">全角半角</label>
                    <div class="segmented-control" id="quanjiaoGroup">
                        <button class="seg-btn selected" data-value="0">不转换</button>
                        <button class="seg-btn" data-value="1">到全角</button>
                        <button class="seg-btn" data-value="2">到半角</button>
                    </div>
                </div>

                <!-- 快捷预设 -->
                <div class="control-group presets-row">
                    <label class="control-label">快捷预设</label>
                    <div class="custom-format-presets">
                        <button class="custom-preset-btn" data-preset="novel">📖 小说投稿</button>
                        <button class="custom-preset-btn" data-preset="essay">📝 论文排版</button>
                        <button class="custom-preset-btn" data-preset="wechat">💬 公众号</button>
                        <button class="custom-preset-btn" data-preset="minimal">✨ 极简清理</button>
                        <button class="custom-preset-btn" data-preset="daily">📅 日常排版</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 文本编辑区域 -->
        <div class="editor-area">
            <textarea name="text" id="textbox" placeholder="在此粘贴或输入需要排版的文本内容..."></textarea>
        </div>

        <!-- 底部状态栏 -->
        <div class="statusbar">
            <span id="msg" class="status-text">就绪</span>
            <span class="status-hint">⌘G 排版 · 点击"排版设置"调整参数</span>
        </div>
    </div>

    <!-- 隐藏的兼容表单元素 -->
    <select id="linespaceSelect" style="display:none;">
        <option value="1">段落间无空行</option>
        <option value="2" selected>段落间空一行</option>
        <option value="3">段落间空两行</option>
        <option value="0">不调整换行</option>
    </select>
    <select id="fstStringSelect" style="display:none;">
        <option value="1">不调整段落缩进</option>
        <option value="2" selected>缩进：全角×2</option>
        <option value="3">缩进：半角×4</option>
        <option value="4">删首尾空格</option>
        <option value="0">自定义缩进</option>
    </select>
    <div style="display:none;">
        <input type="radio" name="quanjiao" value="0" id="quanjiao_no" checked>
        <input type="radio" name="quanjiao" value="1" id="quanjiao_q">
        <input type="radio" name="quanjiao" value="2" id="quanjiao_b">
    </div>
    <span id="fstStringSpan" style="display:none;"></span>

    <script>
        var fast = true;

        // ==================== 排版参数配置名称映射 ====================
        var ConfigLabels = {
            linespace: { '1': '无空行', '2': '空一行', '3': '空两行', '0': '不调整换行' },
            indent:    { '1': '不调整缩进', '2': '全角×2', '3': '半角×4', '4': '删首尾空格', '0': '自定义' },
            quanjiao:  { '0': '不转换', '1': '到全角', '2': '到半角' }
        };

        // 更新工具栏配置摘要
        function updateConfigSummary() {
            var ls = document.getElementById('linespaceSelect').value;
            var indent = document.getElementById('fstStringSelect').value;
            var qjVal = document.getElementById('quanjiao_no').checked ? '0'
                      : document.getElementById('quanjiao_q').checked ? '1' : '2';

            var parts = [
                ConfigLabels.linespace[ls] || '空一行',
                ConfigLabels.indent[indent] || '全角×2',
                ConfigLabels.quanjiao[qjVal] || '不转换'
            ];
            var summary = document.getElementById('configSummary');
            if (summary) summary.textContent = parts.join(' · ');
        }

        // ==================== 主题管理 ====================
        var ThemeManager = {
            STORAGE_KEY: 'app_theme',
            getTheme: function() {
                try { return localStorage.getItem(this.STORAGE_KEY) || 'auto'; }
                catch(e) { return 'auto'; }
            },
            setTheme: function(theme) {
                try { localStorage.setItem(this.STORAGE_KEY, theme); } catch(e) {}
            },
            applyTheme: function(theme) {
                var html = document.documentElement;
                html.classList.remove('light-theme', 'dark-theme', 'auto-theme');
                html.classList.add(theme + '-theme');
                this.setTheme(theme);
            },
            init: function() {
                var saved = this.getTheme();
                this.applyTheme(saved);
                var themeGroup = document.getElementById('themeGroup');
                if (themeGroup) {
                    themeGroup.querySelectorAll('.theme-seg-btn').forEach(function(btn) {
                        btn.classList.remove('selected');
                        if (btn.getAttribute('data-theme') === saved) btn.classList.add('selected');
                    });
                }
            }
        };

        // ==================== 自定义排版预设 ====================
        var FormatPresets = {
            presets: {
                novel: {
                    name: '小说投稿', linespace: '2', indent: '2', quanjiao: '0',
                    xx_blx: true, xx_bd: true, fstString: '　　'
                },
                essay: {
                    name: '论文排版', linespace: '1', indent: '2', quanjiao: '0',
                    xx_blx: false, xx_bd: true, fstString: '　　'
                },
                wechat: {
                    name: '公众号', linespace: '2', indent: '4', quanjiao: '2',
                    xx_blx: true, xx_bd: true, fstString: ''
                },
                minimal: {
                    name: '极简清理', linespace: '0', indent: '4', quanjiao: '0',
                    xx_blx: false, xx_bd: false, fstString: ''
                },
                daily: {
                    name: '日常排版', linespace: '1', indent: '4', quanjiao: '0',
                    xx_blx: false, xx_bd: false, fstString: ''
                }
            },
            applyPreset: function(presetKey) {
                var preset = this.presets[presetKey];
                if (!preset) return;
                this.updateSegmentedControl('linespaceGroup', preset.linespace);
                document.getElementById('linespaceSelect').value = preset.linespace;
                this.updateSegmentedControl('indentGroup', preset.indent);
                document.getElementById('fstStringSelect').value = preset.indent;
                var customWrap = document.getElementById('customIndentWrap');
                if (preset.indent === '0') {
                    customWrap.style.display = 'inline-flex';
                    document.getElementById('fstString').value = preset.fstString || '　　';
                } else {
                    customWrap.style.display = 'none';
                }
                showfstStringSpan();
                this.updateSegmentedControl('quanjiaoGroup', preset.quanjiao);
                updateQuanjiaoRadio(preset.quanjiao);
                document.getElementById('xx_blx').checked = preset.xx_blx;
                document.getElementById('xx_bd').checked = preset.xx_bd;
                updateConfigSummary();
                var msg = document.getElementById('msg');
                msg.innerHTML = '<span style="color: var(--mac-accent);">已应用预设：' + preset.name + '</span>';
                setTimeout(function() { msg.innerHTML = '就绪'; }, 2000);
            },
            updateSegmentedControl: function(groupId, value) {
                var group = document.getElementById(groupId);
                if (!group) return;
                group.querySelectorAll('.seg-btn').forEach(function(btn) {
                    btn.classList.remove('selected');
                    if (btn.getAttribute('data-value') === value) btn.classList.add('selected');
                });
            }
        };

        // ==================== 设置持久化 ====================
        function saveAllSettings() {
            // 保存到 localStorage
            var settings = {
                autocopy: document.getElementById('autocopy').checked,
                xx_bd: document.getElementById('xx_bd').checked,
                xx_blx: document.getElementById('xx_blx').checked,
                selectall: document.getElementById('selectall').checked,
                linespaceSelect: document.getElementById('linespaceSelect').value,
                fstStringSelect: document.getElementById('fstStringSelect').value,
                fstString: document.getElementById('fstString').value,
                quanjiao: document.getElementById('quanjiao_no').checked ? '0' : 
                          document.getElementById('quanjiao_q').checked ? '1' : '2'
            };
            localStorage.setItem('formatAppSettings', JSON.stringify(settings));
            
            // 同时调用原有的 gt.saveOption()
            if (typeof gt !== 'undefined' && typeof gt.saveOption === 'function') {
                gt.saveOption();
            }
        }
        
        function loadSettings() {
            var saved = localStorage.getItem('formatAppSettings');
            if (saved) {
                try {
                    var settings = JSON.parse(saved);
                    
                    // 恢复复选框状态
                    if (settings.autocopy !== undefined) {
                        document.getElementById('autocopy').checked = settings.autocopy;
                    }
                    if (settings.xx_bd !== undefined) {
                        document.getElementById('xx_bd').checked = settings.xx_bd;
                    }
                    if (settings.xx_blx !== undefined) {
                        document.getElementById('xx_blx').checked = settings.xx_blx;
                    }
                    if (settings.selectall !== undefined) {
                        document.getElementById('selectall').checked = settings.selectall;
                    }
                    
                    // 恢复下拉选择
                    if (settings.linespaceSelect !== undefined) {
                        document.getElementById('linespaceSelect').value = settings.linespaceSelect;
                    }
                    if (settings.fstStringSelect !== undefined) {
                        document.getElementById('fstStringSelect').value = settings.fstStringSelect;
                    }
                    if (settings.fstString !== undefined) {
                        document.getElementById('fstString').value = settings.fstString;
                    }
                    
                    // 恢复全角半角选择
                    if (settings.quanjiao !== undefined) {
                        updateQuanjiaoRadio(settings.quanjiao);
                    }
                    
                    // 同步UI分段控件
                    syncSegmentedUI();
                    
                    return true;
                } catch (e) {
                    console.error('加载设置失败:', e);
                }
            }
            return false;
        }

        // 同步UI分段控件：从隐藏表单加载值到UI
        function syncSegmentedUI() {
            // 同步linespace
            var lsVal = document.getElementById('linespaceSelect').value;
            FormatPresets.updateSegmentedControl('linespaceGroup', lsVal);

            // 同步indent
            var indentVal = document.getElementById('fstStringSelect').value;
            FormatPresets.updateSegmentedControl('indentGroup', indentVal);
            var customWrap = document.getElementById('customIndentWrap');
            customWrap.style.display = indentVal === '0' ? 'inline-flex' : 'none';

            // 同步quanjiao
            var qjVal = document.getElementById('quanjiao_no').checked ? '0'
                      : document.getElementById('quanjiao_q').checked ? '1' : '2';
            FormatPresets.updateSegmentedControl('quanjiaoGroup', qjVal);

            showfstStringSpan();
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            var gtformEl = document.getElementById('gtform');
            if (gtformEl) gtformEl.style.display = 'none';

            // 初始化主题
            ThemeManager.init();
            
            // 加载保存的设置
            var settingsLoaded = loadSettings();

            // 主题切换
            document.getElementById('themeGroup').addEventListener('click', function(e) {
                var btn = e.target.closest('.theme-seg-btn');
                if (!btn) return;
                this.querySelectorAll('.theme-seg-btn').forEach(function(b) { b.classList.remove('selected'); });
                btn.classList.add('selected');
                ThemeManager.applyTheme(btn.getAttribute('data-theme'));
            });

            // 设置面板折叠/展开
            var settingsPanel = document.getElementById('settingsPanel');
            var settingsToggle = document.getElementById('settingsToggle');
            var settingsVisible = false;

            function toggleSettings(forceShow) {
                if (typeof forceShow === 'boolean') {
                    settingsVisible = forceShow;
                } else {
                    settingsVisible = !settingsVisible;
                }
                settingsPanel.style.display = settingsVisible ? 'block' : 'none';
                settingsToggle.classList.toggle('active', settingsVisible);
            }

            settingsToggle.addEventListener('click', function() {
                toggleSettings();
            });

            // 点击配置摘要也可打开设置
            document.getElementById('configSummary').addEventListener('click', function() {
                toggleSettings(true);
            });

            // 初始化分段控件
            initSegmentedControl('linespaceGroup', 'linespaceSelect');
            initSegmentedControl('indentGroup', 'fstStringSelect');
            initSegmentedControl('quanjiaoGroup', updateQuanjiaoRadio);

            // 所有分段控件变化时更新配置摘要 + 保存设置
            ['linespaceGroup', 'indentGroup', 'quanjiaoGroup'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    el.addEventListener('segmentedChange', function() {
                        updateConfigSummary();
                        saveAllSettings();
                    });
                }
            });

            // 缩进自定义输入框
            document.getElementById('indentGroup').addEventListener('segmentedChange', function(e) {
                var val = e.detail;
                var customWrap = document.getElementById('customIndentWrap');
                customWrap.style.display = val === '0' ? 'inline-flex' : 'none';
                document.getElementById('fstStringSelect').value = val;
                showfstStringSpan();
            });

            // 自定义缩进文本变化时保存
            document.getElementById('fstString').addEventListener('input', function() {
                saveAllSettings();
            });

            // 复选框变化时保存
            ['xx_blx', 'xx_bd', 'selectall', 'autocopy'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', function() {
                        saveAllSettings();
                    });
                }
            });

            // 预设按钮事件（设置面板内的预设）
            settingsPanel.addEventListener('click', function(e) {
                var btn = e.target.closest('.custom-preset-btn');
                if (!btn) return;
                FormatPresets.applyPreset(btn.getAttribute('data-preset'));
                saveAllSettings();
            });

            // 清空按钮
            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('textbox').value = '';
            });

            // 排版按钮
            document.getElementById('formatBtn').addEventListener('click', function() {
                run();
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if ((navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey) && (e.keyCode === 71 || e.key === 'g')) {
                    e.preventDefault();
                    run();
                    return false;
                }
            });

            // 初始显示：loadOption() 从 cookie 加载后，同步到 UI
            // gt.loadOption() 在 window.onload 中调用，此处延迟同步
            setTimeout(function() {
                // 如果从localStorage加载了设置，确保UI完全同步
                syncSegmentedUI();
                updateConfigSummary();
            }, 50);
        });
        
        // 覆盖 gt.loadOption() 以使用我们的 loadSettings()
        if (typeof gt !== 'undefined') {
            var originalLoadOption = gt.loadOption;
            gt.loadOption = function() {
                // 调用原始的 loadOption
                originalLoadOption.call(this);
                // 然后加载我们的设置
                loadSettings();
            };
        }

        function initSegmentedControl(groupId, targetOrCallback) {
            var group = document.getElementById(groupId);
            if (!group) return;
            group.addEventListener('click', function(e) {
                var btn = e.target.closest('.seg-btn');
                if (!btn) return;
                group.querySelectorAll('.seg-btn').forEach(function(b) { b.classList.remove('selected'); });
                btn.classList.add('selected');
                var value = btn.getAttribute('data-value');
                if (typeof targetOrCallback === 'string') {
                    var target = document.getElementById(targetOrCallback);
                    if (target) target.value = value;
                } else if (typeof targetOrCallback === 'function') {
                    targetOrCallback(value);
                }
                group.dispatchEvent(new CustomEvent('segmentedChange', { detail: value }));
            });
        }

        function updateQuanjiaoRadio(value) {
            document.getElementById('quanjiao_no').checked = (value === '0');
            document.getElementById('quanjiao_q').checked = (value === '1');
            document.getElementById('quanjiao_b').checked = (value === '2');
        }
    </script>

    <script src="Images/main.js"></script>
    <script src="Images/gt.js"></script>
    <script src="Images/b2q.js"></script>
</body>
</html>
