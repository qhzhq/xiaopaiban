name: xiaopaiban_flutter
description: 小排版 - 一款简洁好用的文本排版工具 (Flutter Desktop)
publish_to: 'none'
version: 2.0.1+2001

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # 桌面窗口管理
  window_manager: ^0.3.7
  
  # 键盘快捷键
  hotkey_manager: ^0.1.8
  
  # 剪贴板使用 flutter/services.dart (内置)
  
  # 文件选择
  file_picker: ^6.1.1
  
  # URL 启动
  url_launcher: ^6.2.1
  
  # JSON 序列化
  json_annotation: ^4.8.1
  
  # 国际化
  intl: ^0.19.0
  
  # UUID 生成
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  msix: ^3.16.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansSC-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700

msix_config:
  display_name: 小排版
  publisher_display_name: 小排版开发团队
  identity_name: com.xiaopaiban.app
  publisher: CN=小排版开发团队
  msix_version: 2.0.1.0
  logo_path: assets/icon/app_icon.png
  capabilities: internetClient
  languages: zh-CN
  file_extension:
    - .txt
    - .md
